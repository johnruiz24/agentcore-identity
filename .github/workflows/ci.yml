name: CI Pipeline

on:
  push:
    branches: [main, feat-auth]
  pull_request:
    branches: [main, feat-auth]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov black isort

      - name: Run linting
        run: |
          black --check src tests || true
          isort --check-only src tests || true

      - name: Run tests
        run: |
          pytest --cov=src --cov-report=term-missing || true

      - name: Build Docker image
        run: |
          docker build -f deployment/Dockerfile -t agentcore-identity:test .
